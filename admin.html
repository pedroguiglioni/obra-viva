    <style>

      body { font-family: Arial, sans-serif; margin: 0; background: #f4f4f4; color: #222; }

      header span { color: #8B1A2A; }
      header p { margin: 6px 0 0; color: #888; font-size: 13px; }
      .contenedor { max-width: 960px; margin: 30px auto; background: white; border-radius: 14px; padding: 28px; box-shadow: 0 8px 24px rgba(0,0,0,0.08); }
      .oculto { display: none; }
      .grid { display: grid; grid-template-columns: 1fr 1fr; gap: 16px; }
      .campo { display: flex; flex-direction: column; margin-bottom: 16px; }
      .campo label { font-weight: bold; margin-bottom: 8px; font-size: 13px; color: #444; }
      .campo input, .campo select, .campo textarea { padding: 12px; border: 1px solid #ddd; border-radius: 8px; font-size: 14px; }
      .campo textarea { min-height: 120px; resize: vertical; }
      .campo input:focus, .campo select:focus, .campo textarea:focus { outline: none; border-color: #8B1A2A; }
      .checks { display: flex; gap: 16px; flex-wrap: wrap; margin: 12px 0 20px; }
      .checks label { display: flex; align-items: center; gap: 8px; font-size: 14px; cursor: pointer; }
      .seccion-titulo { font-size: 13px; font-weight: 700; color: #8B1A2A; text-transform: uppercase; letter-spacing: 1.5px; margin: 20px 0 10px; border-bottom: 1px solid #f0f0f0; padding-bottom: 8px; }

      .btn-primario:hover { background: #6e1421; }
      .btn-secundario { background: #fff; color: #111; border: 1px solid #ddd; }
      .btn-peligro { background: #c0392b; }
      .acciones { display: flex; gap: 12px; flex-wrap: wrap; margin-top: 8px; }
      .mensaje { margin-top: 18px; padding: 14px; border-radius: 8px; display: none; white-space: pre-wrap; font-size: 14px; }
      .ok { background: #e6f6ea; color: #1f6d34; display: block !important; }
      .error { background: #fde8e8; color: #9b1c1c; display: block !important; }
      .card-obra { border: 1px solid #e8e8e8; border-radius: 10px; padding: 14px; margin: 10px 0; display: flex; gap: 14px; align-items: flex-start; }
      .card-obra img { width: 80px; height: 80px; object-fit: cover; border-radius: 8px; background: #eee; flex-shrink: 0; }
      .card-obra-info { flex: 1; }
      .card-obra-info strong { font-size: 15px; display: block; margin-bottom: 4px; }
      .card-obra-info span { font-size: 13px; color: #888; }
      .card-obra-acciones { display: flex; gap: 8px; margin-top: 10px; }
      .card-obra-acciones button { padding: 7px 14px; font-size: 12px; }
      .badge { display: inline-block; padding: 2px 8px; border-radius: 4px; font-size: 11px; font-weight: 700; margin-left: 6px; }
      .badge-destacado { background: #fff3cd; color: #856404; }
      .badge-exclusiva { background: #e8f4fd; color: #1565c0; }
      @media (max-width: 700px) { .grid { grid-template-columns: 1fr; } }

    <script>
      const SUPABASE_URL = "https://lggppctkpkuuobjkojik.supabase.co";
      const SUPABASE_KEY = "sb_publishable_kCNVU1eXyJPQljQxbUQaeg_NVzJ0GFd";
      const db = window.supabase.createClient(SUPABASE_URL, SUPABASE_KEY);
 
      const CLAVE_ADMIN = "obraviva2026";
 
      const pantallaLogin = document.getElementById("pantalla-login");

      const mensajeLogin = document.getElementById("mensaje-login");

      function mostrarMensaje(texto, tipo) {

      function abrirAdmin() {
        pantallaLogin.classList.add("oculto");
        pantallaAdmin.classList.remove("oculto");
        sessionStorage.setItem("admin_obraviva_ok", "si");
        cargarObrasAdmin();
      }
 
      function cerrarAdmin() {
        sessionStorage.removeItem("admin_obraviva_ok");
        pantallaAdmin.classList.add("oculto");
        pantallaLogin.classList.remove("oculto");
        document.getElementById("clave-admin").value = "";
      }
 
      function limpiarForm() {
        document.getElementById("obra-id").value = "";
        form.reset();
        document.getElementById("titulo-form").textContent = "Cargar nueva obra";
        mensaje.className = "mensaje";
        mensaje.textContent = "";
      }
 
      async function comprimirImagen(file) {
        const MAX_WIDTH = 1600;
        const QUALITY = 0.82;
        return new Promise((resolve, reject) => {
          const reader = new FileReader();
          reader.onload = (e) => {
            const img = new Image();
            img.onload = () => {
              let width = img.width;
              let height = img.height;
              if (width > MAX_WIDTH) {
                height = Math.round((height * MAX_WIDTH) / width);
                width = MAX_WIDTH;
              }
              const canvas = document.createElement("canvas");
              canvas.width = width;
              canvas.height = height;
              canvas.getContext("2d").drawImage(img, 0, 0, width, height);
              canvas.toBlob((blob) => {
                if (!blob) { reject(new Error("Error comprimiendo")); return; }
                const nombreLimpio = file.name.replace(/\.[^/.]+$/, "") + ".jpg";
                resolve(new File([blob], nombreLimpio, { type: "image/jpeg", lastModified: Date.now() }));
              }, "image/jpeg", QUALITY);
            };
            img.onerror = () => reject(new Error("Error cargando imagen"));
            img.src = e.target.result;
          };
          reader.onerror = () => reject(new Error("Error leyendo archivo"));
          reader.readAsDataURL(file);
        });
      }
 
      if (sessionStorage.getItem("admin_obraviva_ok") === "si") {
        abrirAdmin();
      }
 
      document.getElementById("btn-entrar").addEventListener("click", function() {
        mensajeLogin.style.display = "none";
        if (document.getElementById("clave-admin").value === CLAVE_ADMIN) {
          abrirAdmin();
        } else {
          mensajeLogin.textContent = "Contraseña incorrecta";
          mensajeLogin.className = "mensaje error";
        }
      });
 
      document.getElementById("clave-admin").addEventListener("keypress", function(e) {
        if (e.key === "Enter") document.getElementById("btn-entrar").click();
      });
 
      document.getElementById("btn-salir").addEventListener("click", cerrarAdmin);
      document.getElementById("btn-nueva").addEventListener("click", limpiarForm);
 
      form.addEventListener("submit", async function(e) {
        e.preventDefault();
        mostrarMensaje("Guardando...", "ok");
 
        const files = Array.from(document.getElementById("imagen").files || []);
let imagenUrl = undefined;
let imagenesUrls = undefined;

if (files.length > 0) {
  try {
    mostrarMensaje(`Subiendo ${files.length} imagen${files.length > 1 ? "es" : ""}...`, "ok");

    imagenesUrls = [];

    for (let i = 0; i < files.length; i++) {
      const fileOpt = await comprimirImagen(files[i]);

      const safeName = fileOpt.name
        .normalize("NFD")
        .replace(/[\u0300-\u036f]/g, "")
        .replace(/\s+/g, "-")
        .replace(/[^a-zA-Z0-9._-]/g, "");

      const fileName = `${Date.now()}-${i + 1}-${safeName}`;

      const { error: uploadError } = await db.storage
        .from("obras")
        .upload(fileName, fileOpt);

      if (uploadError) {
        mostrarMensaje("Error subiendo imagen: " + uploadError.message, "error");
        return;
      }

      const { data: publicUrl } = db.storage
        .from("obras")
        .getPublicUrl(fileName);

      imagenesUrls.push(publicUrl.publicUrl);
    }

    imagenUrl = imagenesUrls[0];
  } catch (err) {
    mostrarMensaje("Error con las imágenes: " + err.message, "error");
    return;
  }
}
 
        const obraId = document.getElementById("obra-id").value;
 
        const payload = {
  titulo: document.getElementById("titulo").value.trim(),
  artista: document.getElementById("artista").value.trim() || null,
  tipo_obra: document.getElementById("tipo_obra").value || null,
  estilo: document.getElementById("estilo").value || null,
  tecnica: document.getElementById("tecnica").value.trim() || null,
  anio: document.getElementById("anio").value.trim() || null,
  valor: document.getElementById("valor").value ? Number(document.getElementById("valor").value) : null,
  descripcion: document.getElementById("descripcion").value.trim() || null,

  medidas: document.getElementById("medidas").value.trim() || null,
  medidas_con_marco: document.getElementById("medidas_con_marco").value.trim() || null,
  tipo_pieza: document.getElementById("tipo_pieza").value.trim() || null,
  condicion: document.getElementById("condicion").value.trim() || null,
  autenticacion_detalle: document.getElementById("autenticacion_detalle").value.trim() || null,
  curaduria_breve: document.getElementById("curaduria_breve").value.trim() || null,
  soporte: document.getElementById("soporte").value.trim() || null,
  marco: document.getElementById("marco").value.trim() || null,
  firma: document.getElementById("firma").value.trim() || null,
  procedencia: document.getElementById("procedencia").value.trim() || null,
  ubicacion_obra: document.getElementById("ubicacion_obra").value.trim() || null,
  etiquetas: document.getElementById("etiquetas").value.trim() || null,
  tirada: document.getElementById("tirada").value.trim() || null,
  bio_artista_breve: document.getElementById("bio_artista_breve").value.trim() || null,
  texto_curatorial_largo: document.getElementById("texto_curatorial_largo").value.trim() || null,

  certificado: document.getElementById("certificado").checked,
  obra_unica: document.getElementById("obra_unica").checked,
  acepta_oferta: document.getElementById("acepta_oferta").checked,
  disponible: document.getElementById("disponible").checked,

  destacado: document.getElementById("destacado").checked,
  exclusiva: document.getElementById("exclusiva").checked,
  coleccion: document.getElementById("coleccion").checked,
  edicion_limitada: document.getElementById("edicion_limitada").checked,
  internacional: document.getElementById("internacional").checked,
};
 
        if (imagenUrl !== undefined) {
  payload.imagen = imagenUrl;
  payload.imagenes = imagenesUrls;
}
 
        let error;
        if (obraId) {
          ({ error } = await db.from("obras").update(payload).eq("id", obraId));
        } else {
          ({ error } = await db.from("obras").insert([payload]));
        }
 
        if (error) {
          mostrarMensaje("Error: " + error.message, "error");
          return;
        }
 
        mostrarMensaje(obraId ? "✅ Obra actualizada correctamente" : "✅ Obra guardada correctamente", "ok");
        limpiarForm();
        cargarObrasAdmin();
      });
 
      async function cargarObrasAdmin() {
        const contenedor = document.getElementById("lista-admin");
        contenedor.innerHTML = "<p style='color:#888;font-size:14px;'>Cargando...</p>";
 
        const { data, error } = await db.from("obras").select("*").order("id", { ascending: false });
 
        if (error) { contenedor.innerHTML = "<p style='color:red;'>Error cargando obras</p>"; return; }
        if (!data || data.length === 0) { contenedor.innerHTML = "<p style='color:#888;font-size:14px;'>No hay obras cargadas aún.</p>"; return; }
 
        contenedor.innerHTML = "";
 
        data.forEach((o) => {
          const div = document.createElement("div");
          div.className = "card-obra";
          div.innerHTML = `
            <img src="${o.imagen || 'https://via.placeholder.com/80x80?text=Sin+imagen'}" alt="${o.titulo || ''}" />
            <div class="card-obra-info">
              <strong>${o.titulo || "Sin título"}
                ${o.destacado ? '<span class="badge badge-destacado">⭐ Destacada</span>' : ""}
                ${o.exclusiva ? '<span class="badge badge-exclusiva">💎 Exclusiva</span>' : ""}
              </strong>
              <span>${o.artista || "Sin artista"} · ${o.tipo_obra || ""} · ${o.anio || ""}</span>
              <span style="display:block;margin-top:3px;font-weight:600;color:#111;">${o.valor ? "USD " + Number(o.valor).toLocaleString("es-AR") : "Consultar"}</span>
              <div class="card-obra-acciones">
                <button class="btn-primario" onclick="editarObra(${o.id})">Editar</button>
                <button class="btn-peligro" onclick="eliminarObra(${o.id})">Eliminar</button>
              </div>
            </div>
          `;
          contenedor.appendChild(div);
        });
      }

        document.getElementById("obra-id").value = data.id;
        document.getElementById("titulo").value = data.titulo || "";
document.getElementById("artista").value = data.artista || "";
document.getElementById("tipo_obra").value = data.tipo_obra || "";

document.getElementById("curaduria_breve").value = data.curaduria_breve || "";

document.getElementById("tirada").value = data.tirada || "";

document.getElementById("texto_curatorial_largo").value = data.texto_curatorial_largo || "";

document.getElementById("acepta_oferta").checked = data.acepta_oferta || false;

      async function eliminarObra(id) {
        if (!confirm("¿Eliminar esta obra?")) return;
        const { error } = await db.from("obras").delete().eq("id", id);

        mostrarMensaje("Obra eliminada", "ok");
